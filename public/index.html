<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Video Search</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .search-area { position: sticky; top: 0; background: #121212; padding: 10px 0; z-index: 10; }
        .input-group { display: flex; gap: 5px; max-width: 600px; margin: 0 auto; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; font-size: 16px; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; }

        /* 動画表示エリア */
        #player-box { width: 100%; max-width: 800px; margin: 10px auto; display: none; }
        .video-wrapper { position: relative; padding-top: 56.25%; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 検索結果 */
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 20px; }
        .v-card { cursor: pointer; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-title { padding: 8px; font-size: 12px; height: 3em; overflow: hidden; }
    </style>
</head>
<body>

<div class="search-area">
    <div class="input-group">
        <input type="text" id="query" placeholder="見たい動画を検索...">
        <button onclick="search()">検索</button>
    </div>
</div>

<div id="player-box">
    <div class="video-wrapper">
        <iframe id="main-frame" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
    <h3 id="playing-title" style="padding: 10px; font-size: 16px;"></h3>
</div>

<div id="results"></div>

<script>
    const API_KEY = 'ここAPIキー！！！！！！！'; 

    async function search() {
        const query = document.getElementById('query').value;
        if (!query) return;

        
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&maxResults=20&key=${API_KEY}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            render(data.items);
        } catch (err) {
            alert("エラーが発生しました");
        }
    }

    function render(items) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        items.forEach(item => {
            const videoId = item.id.videoId;
            const title = item.snippet.title;
            const thumb = item.snippet.thumbnails.medium.url;

            const card = document.createElement('div');
            card.className = 'v-card';
            card.onclick = () => {
                document.getElementById('player-box').style.display = 'block';
                // youtube-nocookie.comでブロック回避できる。。。
                document.getElementById('main-frame').src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0`;
                document.getElementById('playing-title').innerText = title;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            card.innerHTML = `<img src="${thumb}"><div class="v-title">${title}</div>`;
            resultsDiv.appendChild(card);
        });
    }

    document.getElementById('query').addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
</script>

</body>
</html>
